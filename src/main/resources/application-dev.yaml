spring:
  datasource:
    url: jdbc:h2:mem:jpatestingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

app:
  error:
    include-methods: true

logging:
  level:
    root: info
    com.dk.jpatesting: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

